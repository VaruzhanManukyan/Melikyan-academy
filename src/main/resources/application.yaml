spring:
  application:
    name: melikyan-academy

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: UTC

  messages:
    basename: messages

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins:
          - http://localhost:3000

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        name: JSESSIONID
        http-only: true
        same-site: lax

security:
  remember-me:
    validity-seconds: 2592000
    hmac-secret: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET"
    cookie-secure: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha