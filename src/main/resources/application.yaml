spring:
  application:
    name: melikyan-academy

  config:
    import: optional:file:.env[.properties]

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: UTC

  messages:
    basename: messages

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins:
          - http://localhost:3000
  admin:
    seed-enabled: ${APP_ADMIN_SEED_ENABLED:false}
    email: ${APP_ADMIN_EMAIL:}
    password: ${APP_ADMIN_PASSWORD:}
    first-name: ${APP_ADMIN_FIRST_NAME:}
    last-name: ${APP_ADMIN_LAST_NAME:}


server:
  servlet:
    session:
      timeout: 30m
      cookie:
        name: JSESSIONID
        http-only: true
        same-site: lax

security:
  remember-me:
    validity-seconds: 2592000
    hmac-secret: ${REMEMBER_ME_HMAC_SECRET}
    cookie-secure: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha